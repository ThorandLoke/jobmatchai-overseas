<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="700" r="300" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1100" cy="100" r="250" fill="#10b981" opacity="0.1"/>
  
  <!-- Main title -->
  <text x="600" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">
    BEREGN ALT
  </text>
  <text x="600" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#93c5fd" letter-spacing="8">
    KØB • SALG • RENOVERING
  </text>
  
  <!-- Feature cards -->
  <!-- Card 1: Køb -->
  <g transform="translate(100, 250)">
    <rect width="300" height="200" rx="20" fill="url(#card)" stroke="white" stroke-opacity="0.2"/>
    <text x="150" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fbbf24">🏠 KØB BOLIG</text>
    <text x="150" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">Tinglysningsafgift</text>
    <text x="150" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">Realkreditlån</text>
    <text x="150" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">Advokatgebyr</text>
    <text x="150" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">Ejerskifteforsikring</text>
  </g>
  
  <!-- Card 2: Salg -->
  <g transform="translate(450, 250)">
    <rect width="300" height="200" rx="20" fill="url(#card)" stroke="white" stroke-opacity="0.2"/>
    <text x="150" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#f472b6">💰 SALG BOLIG</text>
    <text x="150" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">Mæglerhonorar</text>
    <text x="150" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">Markedsføringsomk.</text>
    <text x="150" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">Energimærkning</text>
    <text x="150" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">Tinglysning</text>
  </g>
  
  <!-- Card 3: Renovering -->
  <g transform="translate(800, 250)">
    <rect width="300" height="200" rx="20" fill="url(#card)" stroke="white" stroke-opacity="0.2"/>
    <text x="150" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#34d399">⚡ RENOVERING</text>
    <text x="150" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">Varmepumpe</text>
    <text x="150" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">Solceller</text>
    <text x="150" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">Isolering</text>
    <text x="150" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">Vinduer</text>
  </g>
  
  <!-- Bottom tagline -->
  <rect x="150" y="520" width="900" height="80" rx="40" fill="#10b981"/>
  <text x="600" y="572" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">
    🇩🇰 DEN MEST KOMPLETTE GRATIS BOLIGBEREGNER I DANMARK
  </text>
  
  <!-- Stats row -->
  <g transform="translate(100, 650)">
    <text x="150" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fbbf24">100%</text>
    <text x="150" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.7">GRATIS</text>
    
    <text x="450" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#f472b6">0 kr.</text>
    <text x="450" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.7">SKJULTE OMFKOSTNINGER</text>
    
    <text x="750" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#34d399">∞</text>
    <text x="750" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.7">BEREGNINGER</text>
    
    <text x="1000" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#60a5fa">3</text>
    <text x="1000" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.7">SPARET TID</text>
  </g>
  
  <!-- URL -->
  <text x="600" y="760" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#93c5fd">
    denmark-home-calculator-mikr30lsh-thorandlokes-projects.vercel.app
  </text>
</svg>
