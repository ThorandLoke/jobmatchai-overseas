<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丹麦房产计算器 - 推广素材预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 40px;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 40px;
            font-size: 28px;
        }
        .grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .card img {
            width: 100%;
            display: block;
        }
        .card-label {
            background: #f8fafc;
            padding: 16px;
            text-align: center;
            font-weight: 600;
            color: #1e293b;
        }
    </style>
</head>
<body>
    <h1>📱 BoligBeregner Danmark - 推广素材预览</h1>
    <div class="grid">
        <div class="card">
            <img src="image-A.png" alt="图片 A">
            <div class="card-label">A · 手机截图风格</div>
        </div>
        <div class="card">
            <img src="image-B.png" alt="图片 B">
            <div class="card-label">B · 6宫格功能展示</div>
        </div>
        <div class="card">
            <img src="image-C.png" alt="图片 C">
            <div class="card-label">C · 数据+CTA</div>
        </div>
    </div>
</body>
</html>
