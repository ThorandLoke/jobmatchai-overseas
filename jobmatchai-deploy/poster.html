<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobMatchAI - 推广海报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #1a4a7a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .poster {
            width: 1080px;
            max-width: 100%;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
            border-radius: 24px;
            padding: 80px 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }
        
        /* 装饰圆形 */
        .poster::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
        }
        .poster::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,165,0,0.1) 0%, transparent 70%);
            bottom: -50px;
            left: -50px;
        }
        
        .logo {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 8px;
            position: relative;
        }
        .logo .brand {
            background: linear-gradient(90deg, #ff6f00, #ffca28, #ff8f00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo .ai {
            color: #00d4ff;
            -webkit-text-fill-color: #00d4ff;
            font-size: 3.2rem;
        }
        
        .headline {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            margin: 20px 0 10px;
            letter-spacing: 2px;
        }
        
        .subheadline {
            font-size: 1.4rem;
            color: #a8d4f0;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 50px;
            position: relative;
            flex-wrap: wrap;
        }
        .feature {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0,212,255,0.25);
            border-radius: 20px;
            padding: 30px 28px;
            width: 220px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s, border-color 0.3s;
        }
        .feature:hover {
            transform: translateY(-5px);
            border-color: rgba(0,212,255,0.5);
        }
        .feature-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        .feature-title {
            font-size: 1.2rem;
            color: #fff;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .feature-desc {
            font-size: 0.9rem;
            color: #a0c4e8;
            line-height: 1.5;
        }
        
        .flags {
            font-size: 1.5rem;
            margin-bottom: 40px;
            letter-spacing: 12px;
        }
        
        .cta {
            display: inline-block;
            background: linear-gradient(90deg, #ff6f00, #ff8f00, #ffca28);
            color: #fff;
            font-size: 1.6rem;
            font-weight: 700;
            padding: 18px 50px;
            border-radius: 50px;
            text-decoration: none;
            letter-spacing: 2px;
            box-shadow: 0 8px 30px rgba(255,143,0,0.4);
            margin-bottom: 40px;
        }
        
        .url {
            font-size: 1.8rem;
            color: #00d4ff;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .free-badge {
            position: absolute;
            top: 30px;
            right: 30px;
            background: linear-gradient(135deg, #00c853, #00e676);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 20px;
            letter-spacing: 1px;
        }
        
        .footer {
            margin-top: 40px;
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
        }
        
        @media (max-width: 768px) {
            .poster { padding: 50px 30px; }
            .headline { font-size: 2rem; }
            .features { gap: 20px; }
            .feature { width: 160px; padding: 20px; }
            .logo { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="free-badge">完 全 免 费</div>
        
        <div class="logo">
            <span class="brand">JobMatch</span><span class="ai">AI</span>
        </div>
        
        <h1 class="headline">AI 智能求职助手</h1>
        <p class="subheadline">让找工作变得更简单</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📄</div>
                <div class="feature-title">简历分析</div>
                <div class="feature-desc">智能识别亮点<br>突出核心能力</div>
            </div>
            <div class="feature">
                <div class="feature-icon">✉️</div>
                <div class="feature-title">求职信生成</div>
                <div class="feature-desc">中/英/丹麦语<br>一键生成</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔍</div>
                <div class="feature-title">智能匹配</div>
                <div class="feature-desc">全球职位搜索<br>精准推荐</div>
            </div>
        </div>
        
        <div class="flags">🇨🇳 🇬🇧 🇩🇰</div>
        
        <a class="cta" href="https://job-match-ai.com">立即使用</a>
        
        <div class="url">job-match-ai.com</div>
        
        <div class="footer">无需注册 · 即开即用 · 完全免费</div>
    </div>
</body>
</html>
