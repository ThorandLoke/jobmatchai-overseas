services:
  - type: web
    name: jobmatchai-overseas
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend_main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: NOTIFY_ENABLED
        value: "false"
      - key: STRIPE_SECRET_KEY
        sync: false
