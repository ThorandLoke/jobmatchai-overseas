<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobMatchAI 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .header h1 { color: #60a5fa; font-size: 24px; }
        .header .subtitle { color: #94a3b8; font-size: 14px; margin-top: 4px; }
        
        /* Login Screen */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .login-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h2 { margin-bottom: 24px; color: #60a5fa; }
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        .login-box input:focus {
            outline: none;
            border-color: #60a5fa;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-box button:hover { background: #2563eb; }
        .login-error { color: #ef4444; margin-top: 12px; display: none; }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #1e293b;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 48px;
            font-weight: 700;
            color: #60a5fa;
        }
        .stat-label { color: #94a3b8; margin-top: 8px; font-size: 14px; }
        
        /* Filters */
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filters select {
            padding: 10px 16px;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .filters input {
            padding: 10px 16px;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .filters button {
            padding: 10px 20px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .filters button:hover { background: #2563eb; }
        
        /* Table */
        .table-container {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th {
            background: #334155;
            font-weight: 600;
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
        }
        tr:hover { background: #263344; }
        
        /* Status Badges */
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status.pending { background: #fbbf24; color: #000; }
        .status.processing { background: #3b82f6; color: #fff; }
        .status.completed { background: #22c55e; color: #fff; }
        .status.rejected { background: #ef4444; color: #fff; }
        
        /* Source Badges */
        .source {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            background: #475569;
            color: #e2e8f0;
        }
        
        /* Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            overflow-y: auto;
            padding: 40px 20px;
        }
        .modal.show { display: flex; justify-content: center; }
        .modal-content {
            background: #1e293b;
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            padding: 32px;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
        }
        .modal-section {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #334155;
        }
        .modal-section:last-child { border: none; margin: 0; padding: 0; }
        .modal-section h3 {
            color: #60a5fa;
            font-size: 14px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .modal-row {
            display: flex;
            margin-bottom: 8px;
        }
        .modal-label {
            width: 120px;
            color: #94a3b8;
            font-size: 13px;
        }
        .modal-value { color: #e2e8f0; font-size: 13px; }
        .resume-preview {
            background: #0f172a;
            padding: 16px;
            border-radius: 8px;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .job-links { display: flex; flex-direction: column; gap: 8px; }
        .job-link {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .job-link a { color: #60a5fa; text-decoration: none; font-size: 12px; }
        .job-link a:hover { text-decoration: underline; }
        
        /* Action Buttons */
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .btn-view { background: #3b82f6; color: #fff; }
        .btn-process { background: #22c55e; color: #fff; }
        .btn-complete { background: #10b981; color: #fff; }
        .btn-reject { background: #ef4444; color: #fff; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        .error {
            text-align: center;
            padding: 40px;
            color: #ef4444;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .table-container { overflow-x: auto; }
            table { min-width: 800px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>🔐 JobMatchAI 管理后台</h2>
            <input type="password" id="adminPassword" placeholder="请输入管理员密码" />
            <button onclick="login()">登录</button>
            <p class="login-error" id="loginError">密码错误，请重试</p>
        </div>
    </div>
    
    <!-- Main Dashboard -->
    <div class="container hidden" id="mainDashboard">
        <div class="header">
            <div>
                <h1>📊 JobMatchAI 管理后台</h1>
                <p class="subtitle">Beta 测试数据分析</p>
            </div>
            <div style="text-align: right;">
                <button class="btn btn-process" onclick="refreshData()" style="margin-bottom: 8px;">🔄 刷新数据</button>
                <p style="color: #94a3b8; font-size: 12px;">最后更新: <span id="lastUpdate">-</span></p>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalCount">-</div>
                <div class="stat-label">总提交数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayCount">-</div>
                <div class="stat-label">今日提交</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="resumeCount">-</div>
                <div class="stat-label">有简历</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="jobCount">-</div>
                <div class="stat-label">有职位</div>
            </div>
        </div>
        
        <!-- Filters -->
        <div class="filters">
            <select id="statusFilter" onchange="loadSubmissions()">
                <option value="all">全部状态</option>
                <option value="pending">待处理</option>
                <option value="processing">处理中</option>
                <option value="completed">已完成</option>
                <option value="rejected">已拒绝</option>
            </select>
            <select id="sourceFilter" onchange="loadSubmissions()">
                <option value="all">全部来源</option>
                <option value="website">官网</option>
                <option value="xiaohongshu">小红书</option>
                <option value="xiianyu">闲鱼</option>
                <option value="facebook">Facebook</option>
            </select>
            <input type="text" id="searchEmail" placeholder="搜索邮箱..." onkeyup="if(event.key==='Enter')loadSubmissions()" />
            <button onclick="loadSubmissions()">🔍 搜索</button>
        </div>
        
        <!-- Table -->
        <div class="table-container">
            <div class="loading" id="tableLoading">加载中...</div>
            <table id="submissionsTable" style="display: none;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>邮箱</th>
                        <th>姓名</th>
                        <th>来源</th>
                        <th>时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="submissionsBody"></tbody>
            </table>
        </div>
    </div>
    
    <!-- Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let adminToken = '';
        
        // Admin password - in production, this should be validated server-side
        const ADMIN_PASSWORD = 'JobMatchAI2026!';
        
        function login() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                adminToken = password;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                loadAll();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
        
        async function loadAll() {
            await Promise.all([loadStatistics(), loadSubmissions()]);
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
        }
        
        async function refreshData() {
            await loadAll();
        }
        
        async function loadStatistics() {
            try {
                const res = await fetch(`${API_BASE}/beta/statistics`);
                const data = await res.json();
                
                document.getElementById('totalCount').textContent = data.total_submissions || 0;
                document.getElementById('todayCount').textContent = data.today_submissions || 0;
                document.getElementById('resumeCount').textContent = data.with_resume || 0;
                document.getElementById('jobCount').textContent = data.with_job_links || 0;
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }
        
        async function loadSubmissions() {
            const loading = document.getElementById('tableLoading');
            const table = document.getElementById('submissionsTable');
            
            loading.style.display = 'block';
            table.style.display = 'none';
            
            try {
                const status = document.getElementById('statusFilter').value;
                const source = document.getElementById('sourceFilter').value;
                
                const res = await fetch(`${API_BASE}/beta/submissions?status=${status}&source=${source}&limit=100`);
                const data = await res.json();
                
                const tbody = document.getElementById('submissionsBody');
                tbody.innerHTML = '';
                
                if (!data.submissions || data.submissions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#94a3b8;">暂无数据</td></tr>';
                } else {
                    data.submissions.forEach(sub => {
                        const statusClass = {
                            'pending': 'pending',
                            'processing': 'processing',
                            'completed': 'completed',
                            'rejected': 'rejected'
                        }[sub.status] || 'pending';
                        
                        const statusText = {
                            'pending': '待处理',
                            'processing': '处理中',
                            'completed': '已完成',
                            'rejected': '已拒绝'
                        }[sub.status] || sub.status;
                        
                        const sourceText = {
                            'website': '官网',
                            'xiaohongshu': '小红书',
                            'xiianyu': '闲鱼',
                            'facebook': 'Facebook'
                        }[sub.source] || sub.source || '官网';
                        
                        const date = new Date(sub.created_at).toLocaleString('zh-CN');
                        
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>${sub.id}</strong></td>
                                <td>${sub.email || '-'}</td>
                                <td>${sub.name || '-'}</td>
                                <td><span class="source">${sourceText}</span></td>
                                <td>${date}</td>
                                <td><span class="status ${statusClass}">${statusText}</span></td>
                                <td>
                                    <div class="btn-group">
                                        <button class="btn btn-view" onclick="viewDetail('${sub.id}')">查看</button>
                                        <button class="btn btn-complete" onclick="updateStatus('${sub.id}', 'completed')">完成</button>
                                        <button class="btn btn-reject" onclick="updateStatus('${sub.id}', 'rejected')">拒绝</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                }
                
                loading.style.display = 'none';
                table.style.display = 'table';
            } catch (e) {
                loading.innerHTML = '<div class="error">加载失败: ' + e.message + '</div>';
            }
        }
        
        async function viewDetail(id) {
            try {
                const res = await fetch(`${API_BASE}/beta/submission/${id}`);
                const data = await res.json();
                
                if (!data.submission) {
                    alert('未找到该记录');
                    return;
                }
                
                const sub = data.submission;
                const modal = document.getElementById('modalContent');
                
                modal.innerHTML = `
                    <div class="modal-section">
                        <h3>基本信息</h3>
                        <div class="modal-row">
                            <span class="modal-label">ID:</span>
                            <span class="modal-value">${sub.id}</span>
                        </div>
                        <div class="modal-row">
                            <span class="modal-label">邮箱:</span>
                            <span class="modal-value">${sub.email || '-'}</span>
                        </div>
                        <div class="modal-row">
                            <span class="modal-label">姓名:</span>
                            <span class="modal-value">${sub.name || '-'}</span>
                        </div>
                        <div class="modal-row">
                            <span class="modal-label">电话:</span>
                            <span class="modal-value">${sub.phone || '-'}</span>
                        </div>
                        <div class="modal-row">
                            <span class="modal-label">地区:</span>
                            <span class="modal-value">${sub.country || '-'} / ${sub.city || '-'}</span>
                        </div>
                        <div class="modal-row">
                            <span class="modal-label">来源:</span>
                            <span class="modal-value">${sub.source || '官网'}</span>
                        </div>
                        <div class="modal-row">
                            <span class="modal-label">提交时间:</span>
                            <span class="modal-value">${new Date(sub.created_at).toLocaleString('zh-CN')}</span>
                        </div>
                        <div class="modal-row">
                            <span class="modal-label">备注:</span>
                            <span class="modal-value">${sub.notes || '-'}</span>
                        </div>
                    </div>
                    
                    <div class="modal-section">
                        <h3>简历内容</h3>
                        <div class="resume-preview">${(sub.resumes && sub.resumes.length > 0 && sub.resumes[0].raw_text) || '无简历'}</div>
                    </div>
                    
                    <div class="modal-section">
                        <h3>职位链接 (${(sub.job_links || []).length})</h3>
                        <div class="job-links">
                            ${(sub.job_links && sub.job_links.length > 0) ? sub.job_links.map(j => `
                                <div class="job-link">
                                    <div>
                                        <strong>${j.job_title || '未知职位'}</strong><br>
                                        <small style="color:#94a3b8">${j.company || '-'} • ${j.platform || '-'}</small>
                                    </div>
                                    <a href="${j.url}" target="_blank">查看链接 →</a>
                                </div>
                            `).join('') : '<p style="color:#94a3b8">无职位链接</p>'}
                        </div>
                    </div>
                    
                    <div class="modal-section">
                        <h3>社交账号 (${(sub.social_accounts || []).length})</h3>
                        <div class="job-links">
                            ${(sub.social_accounts && sub.social_accounts.length > 0) ? sub.social_accounts.map(s => `
                                <div class="job-link">
                                    <div>
                                        <strong>${s.platform}</strong>
                                        ${s.username ? `<br><small style="color:#94a3b8">@${s.username}</small>` : ''}
                                    </div>
                                    ${s.profile_url ? `<a href="${s.profile_url}" target="_blank">查看 →</a>` : ''}
                                </div>
                            `).join('') : '<p style="color:#94a3b8">无社交账号</p>'}
                        </div>
                    </div>
                    
                    <div class="modal-section">
                        <h3>操作</h3>
                        <div class="btn-group">
                            <button class="btn btn-complete" onclick="updateStatus('${sub.id}', 'completed'); closeModal();">标记为已完成</button>
                            <button class="btn btn-process" onclick="updateStatus('${sub.id}', 'processing'); closeModal();">标记为处理中</button>
                            <button class="btn btn-reject" onclick="updateStatus('${sub.id}', 'rejected'); closeModal();">标记为已拒绝</button>
                        </div>
                    </div>
                `;
                
                document.getElementById('detailModal').classList.add('show');
            } catch (e) {
                alert('加载详情失败: ' + e.message);
            }
        }
        
        async function updateStatus(id, status) {
            if (!confirm(`确定要将状态更新为"${status === 'completed' ? '已完成' : status === 'processing' ? '处理中' : '已拒绝'}"吗？`)) {
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/beta/update-status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ submission_id: id, status: status })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    await loadSubmissions();
                    await loadStatistics();
                } else {
                    alert('更新失败: ' + (data.error || '未知错误'));
                }
            } catch (e) {
                alert('更新失败: ' + e.message);
            }
        }
        
        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }
        
        // Close modal on outside click
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        // Enter key for login
        document.getElementById('adminPassword').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
