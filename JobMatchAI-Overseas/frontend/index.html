<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JobMatchAI - AI Job Search Assistant for Nordic Jobs">
    <meta name="keywords" content="job, resume, AI, Denmark, Sweden, Norway, Nordic">
    <title>JobMatchAI - AI Job Search Assistant</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            margin: 0;
        }
        .loading { text-align: center; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading h2 { font-weight: 400; opacity: 0.9; }
        .loading p { opacity: 0.6; font-size: 14px; margin-top: 10px; }
        .lang-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
        }
        .lang-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .lang-btn:hover {
            background: rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>
    <!-- 语言切换按钮 -->
    <div class="lang-toggle">
        <button class="lang-btn" onclick="switchLang('zh')">中文</button>
        <button class="lang-btn" onclick="switchLang('en')">English</button>
    </div>

    <div class="loading">
        <div class="spinner"></div>
        <h2>Loading JobMatchAI...</h2>
        <p id="status">Detecting language...</p>
    </div>

    <script>
        function switchLang(lang) {
            const targetPage = lang === 'zh' ? 'index-zh.html' : 'index-en.html';
            window.location.href = targetPage;
        }

        (function() {
            const browserLang = navigator.language || navigator.userLanguage || 'en';
            const lang = browserLang.toLowerCase();
            const isChinese = lang.startsWith('zh');
            const targetPage = isChinese ? 'index-zh.html' : 'index-en.html';
            document.getElementById('status').textContent = 'Detected: ' + browserLang + ' → Redirecting...';
            console.log('Language detected:', browserLang, '->', targetPage);
            setTimeout(function() { window.location.href = targetPage; }, 300);
        })();
    </script>
</body>
</html>
